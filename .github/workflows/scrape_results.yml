name: Scrape Race Results

on:
  workflow_dispatch:
    inputs:
      series:
        description: 'Series ID (e.g. nascar, wec, indycar, f1)'
        required: true
        default: 'nascar'
      session_id:
        description: 'Specific session ID (optional, e.g. nascar-2026-r10-s3)'
        required: false
      force:
        description: 'Overwrite existing results (true/false)'
        required: false
        default: 'false'

  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper — all finished sessions
        if: github.event_name == 'schedule'
        run: |
          for series in nascar nascar_oreilly nascar_trucks indycar wec imsa f1 f2 f3 motogp moto2 moto3 formulae wrc dtm supercars elms gtwce british_gt; do
            echo "🏁 Processing $series..."
            python scrape_results.py --series $series --all-finished || echo "⚠️ Failed for $series, continuing..."
          done

      - name: Run scraper — specific series/session
        if: github.event_name == 'workflow_dispatch'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ -n "${{ github.event.inputs.session_id }}" ]; then
            python scrape_results.py --series ${{ github.event.inputs.series }} --session-id ${{ github.event.inputs.session_id }} $FORCE_FLAG
          else
            python scrape_results.py --series ${{ github.event.inputs.series }} --all-finished $FORCE_FLAG
          fi

      - name: Commit and push results
        run: |
          git config user.name "RaceDay Bot"
          git config user.email "bot@raceday.app"
          git add *.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏁 Auto-update race results $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
